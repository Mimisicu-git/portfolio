<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect 404s to index.html with the original route in sessionStorage
      const path = window.location.pathname.replace('/portfolio', '');
      const fullPath = path + window.location.search + window.location.hash;
      if (fullPath !== '/' && !fullPath.includes('index.html')) {
        sessionStorage.setItem('redirect_path', fullPath);
      }
      window.location.replace('/portfolio/');
    </script>
  </head>
  <body></body>
</html>
