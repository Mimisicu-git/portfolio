<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect all 404s to index.html
      const path = window.location.pathname.replace(/\/$/, '') || '/';
      const redirect = path + window.location.search + window.location.hash;
      window.location.href = '/portfolio/?' + new URLSearchParams({ redirect }).toString();
    </script>
  </head>
  <body></body>
</html>
