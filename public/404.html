<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect all 404s to the correct path with /portfolio prefix
      const path = window.location.pathname.replace(/\/$/, '') || '/';
      if (!path.startsWith('/portfolio')) {
        window.location.replace('/portfolio' + path + window.location.search + window.location.hash);
      }
    </script>
  </head>
  <body></body>
</html>
